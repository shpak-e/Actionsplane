# Dependabot — weekly dependency PRs across the three ecosystems in this repo.
# GitHub Actions pins are grouped so a single PR bumps them together (they change often
# and we keep them SHA-pinned); Python and npm minor/patch bumps are grouped to cut noise.
version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Interdependent majors must upgrade together or npm ci hits peer conflicts,
      # so group each family into a single PR (patterns-based groups catch all update types).
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      vite:
        patterns: ["vite", "@vitejs/*"]
      npm-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
