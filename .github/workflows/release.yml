# Release: build + push the four component images to GHCR with provenance attestations.
#
# Trigger: push a semver tag (`git tag v0.1.0 && git push origin v0.1.0`), or run manually.
# Auth: the built-in GITHUB_TOKEN (packages:write) — no PAT, no extra account, no secret to manage.
# Images: ghcr.io/<owner>/actionsplane-{api,ingestor,worker,frontend}
#   tags: exact version (v0.1.0 → 0.1.0), major.minor (0.1), latest (on tags), and the git SHA.
# Supply chain (dogfooding what ActionsPlane preaches):
#   - every third-party action SHA-pinned
#   - buildx provenance + SBOM baked into the image manifest
#   - GitHub artifact attestation (SLSA provenance) pushed to the registry
#     → verify with: gh attestation verify oci://ghcr.io/<owner>/actionsplane-api:<tag> --owner <owner>
#
# After the first push, each package appears at github.com/<owner>?tab=packages — set visibility
# to Public there once (packages default to private) and optionally "Connect repository" so the
# package page links back to this repo.

name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write      # push to GHCR with GITHUB_TOKEN
      id-token: write      # sign the attestation (OIDC)
      attestations: write  # store the attestation
    strategy:
      fail-fast: false
      matrix:
        component: [api, ingestor, worker, frontend]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5
        with:
          persist-credentials: false

      - name: Set image name (registry requires lowercase)
        run: echo "IMAGE=${REGISTRY}/${OWNER,,}/actionsplane-${{ matrix.component }}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      # cache-image/cache-binary off (zizmor cache-poisoning): both default to caching via the
      # shared GHA cache, which is a poisoning vector in a workflow that publishes images.
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
        with:
          cache-image: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          cache-binary: false

      - name: Log in to GHCR
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
          labels: |
            org.opencontainers.image.title=actionsplane-${{ matrix.component }}
            org.opencontainers.image.description=ActionsPlane ${{ matrix.component }} — fleet control plane for GitHub Actions
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: deploy/docker/Dockerfile.${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          # No GHA build cache on purpose (zizmor cache-poisoning): a poisoned cache entry could
          # inject content into a *published* image. Releases are rare — cold builds are fine.

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
