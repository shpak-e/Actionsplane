# CI — lint, test, typecheck the frontend, apply migrations on real Postgres, and audit
# our own workflows. We dogfood ActionsPlane's own thesis: third-party actions are
# SHA-pinned (not @v4) so a tag-retargeting attack can't silently change what runs here,
# and every checkout drops its credential (`persist-credentials: false`) so a later step
# can't reuse it. uv is installed via the official script to keep the action surface minimal.
name: ci

on:
  push:
    branches: [master]
  pull_request:

# One in-flight run per ref; a new push cancels the superseded run instead of queueing.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: backend
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Sync dependencies (locked)
        run: uv sync --frozen --extra dev

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test
        run: uv run pytest -q

  frontend:
    name: frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      # actions/setup-node@v4.1.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (locked)
        run: npm ci

      - name: Typecheck
        run: npm run lint  # tsc --noEmit

      - name: Build
        run: npm run build

      - name: Dependency CVE scan (npm audit, non-blocking)
        # Surfaces known-vulnerable frontend deps at high+ severity. Non-blocking (|| true) like the
        # backend pip-audit — informational until we decide to gate on it (review §4 / 5.0.7).
        run: npm audit --audit-level=high || true

  migrations:
    name: migrations
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: actionsplane
          POSTGRES_PASSWORD: actionsplane
          POSTGRES_DB: actionsplane
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U actionsplane"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Point alembic at the service container instead of the config default.
      ACTIONSPLANE_DATABASE_URL: postgresql+asyncpg://actionsplane:actionsplane@localhost:5432/actionsplane
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Sync dependencies (locked)
        run: uv sync --frozen --extra dev

      - name: Apply migrations to head
        run: uv run alembic upgrade head

      - name: Round-trip the latest migration (down then up)
        run: |
          uv run alembic downgrade -1
          uv run alembic upgrade head

  security:
    name: security
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Audit our own workflows (zizmor)
        env:
          # Lets zizmor run its online checks (impostor-commit, ref-confusion,
          # known-vulnerable-actions) against the pinned action SHAs.
          GH_TOKEN: ${{ github.token }}
        run: uvx zizmor@1 --persona=regular .github/workflows/

      - name: Dependency CVE scan (pip-audit, non-blocking)
        # Advisories can land against transitive deps we can't immediately fix; surface them
        # without blocking merges (Dependabot files the fix PRs). Flip to blocking once green.
        continue-on-error: true
        run: |
          uv export --frozen --no-emit-project --no-hashes --format requirements-txt -o /tmp/requirements.txt
          uvx pip-audit -r /tmp/requirements.txt
