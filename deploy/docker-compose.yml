# Dev stack — `make up`. Postgres + Redis only; run the API/ingestor/worker on the host
# with `make api` / `make ingestor` / `make worker` for fast reload during development.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: actionsplane
      POSTGRES_PASSWORD: actionsplane
      POSTGRES_DB: actionsplane
    # Loopback only — dev DB must not be exposed on the LAN (review 4, N6).
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U actionsplane"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    # Require auth even in dev (review 4, H-1) — an open Redis lets anything on the host enqueue
    # arq jobs / forge SSE envelopes. Override with REDIS_PASSWORD in your shell or .env; keep
    # ACTIONSPLANE_REDIS_URL in your .env in sync: redis://:<password>@localhost:6379/0
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-actionsplane}"]
    environment:
      # Lets the healthcheck's redis-cli authenticate without putting the password on the cmdline.
      REDISCLI_AUTH: ${REDIS_PASSWORD:-actionsplane}
    # Loopback only (review 4, N6).
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
