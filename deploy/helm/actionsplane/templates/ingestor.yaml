apiVersion: v1
kind: Service
metadata:
  name: {{ include "actionsplane.fullname" . }}-ingestor
  labels: {{- include "actionsplane.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: ingestor
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "actionsplane.fullname" . }}-ingestor
  labels: {{- include "actionsplane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ingestor.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: ingestor
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: ingestor
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 10001 }
      containers:
        - name: ingestor
          image: {{ include "actionsplane.image" (dict "ctx" . "name" .Values.ingestor.imageName) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: 8001 }]
          envFrom: {{- include "actionsplane.envFrom" . | nindent 12 }}
          volumeMounts:
            - { name: github-key, mountPath: /secrets, readOnly: true }
            - { name: tmp, mountPath: /tmp }
          readinessProbe:
            httpGet: { path: /healthz, port: 8001 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8001 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources: {{- toYaml .Values.ingestor.resources | nindent 12 }}
          securityContext: {{- include "actionsplane.containerSecurity" . | nindent 12 }}
      volumes:
        - name: github-key
          secret: { secretName: {{ .Values.secrets.existingGithubKeySecret }} }
        - name: tmp
          emptyDir: {}
