{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "actionsplane.fullname" . }}-migrate
  labels: {{- include "actionsplane.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels: {{- include "actionsplane.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      securityContext: { runAsNonRoot: true, runAsUser: 10001 }
      {{- if .Values.postgres.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image }}
          command: ["sh", "-c", "until pg_isready -h {{ include "actionsplane.postgresHost" . }} -U actionsplane; do sleep 2; done"]
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "actionsplane.image" (dict "ctx" . "name" .Values.api.imageName) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          envFrom: {{- include "actionsplane.envFrom" . | nindent 12 }}
{{- end }}
