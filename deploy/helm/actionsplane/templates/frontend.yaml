apiVersion: v1
kind: Service
metadata:
  name: {{ include "actionsplane.fullname" . }}-frontend
  labels: {{- include "actionsplane.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "actionsplane.fullname" . }}-frontend
  labels: {{- include "actionsplane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: frontend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: frontend
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: frontend
          image: {{ include "actionsplane.image" (dict "ctx" . "name" .Values.frontend.imageName) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: 80 }]
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.frontend.resources | nindent 12 }}
