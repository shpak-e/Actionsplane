{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "actionsplane.fullname" . }}
  labels: {{- include "actionsplane.labels" . | nindent 4 }}
  annotations: {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /webhook
            pathType: Prefix
            backend:
              service:
                name: {{ include "actionsplane.fullname" . }}-ingestor
                port: { number: 8001 }
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "actionsplane.apiHost" . }}
                port: { number: 8000 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "actionsplane.fullname" . }}-frontend
                port: { number: 80 }
{{- end }}
