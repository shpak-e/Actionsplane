{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "actionsplane.redisHost" . }}
  labels: {{- include "actionsplane.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: redis
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "actionsplane.redisHost" . }}
  labels: {{- include "actionsplane.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 999 }
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          {{- if .Values.redis.auth }}
          # Require auth (review §4 H-1). Password from the existing app secret; REDISCLI_AUTH lets
          # the probe authenticate without exposing it on the command line.
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef: { name: {{ .Values.secrets.existingSecret }}, key: ACTIONSPLANE_REDIS_PASSWORD }
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef: { name: {{ .Values.secrets.existingSecret }}, key: ACTIONSPLANE_REDIS_PASSWORD }
          {{- end }}
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 3
            periodSeconds: 5
{{- end }}
