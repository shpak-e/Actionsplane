{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "actionsplane.postgresHost" . }}
  labels: {{- include "actionsplane.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/component: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "actionsplane.postgresHost" . }}
  labels: {{- include "actionsplane.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "actionsplane.postgresHost" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 999, fsGroup: 999 }
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports: [{ containerPort: 5432 }]
          env:
            - name: POSTGRES_USER
              value: actionsplane
            - name: POSTGRES_DB
              value: actionsplane
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "actionsplane"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
{{- end }}
