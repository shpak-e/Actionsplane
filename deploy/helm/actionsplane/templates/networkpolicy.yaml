{{- if .Values.networkPolicy.enabled }}
{{- $inst := .Release.Name }}
{{- $labels := include "actionsplane.labels" . }}
{{- $ingressNs := .Values.networkPolicy.ingressControllerNamespaceSelector }}
# Default-deny + least-privilege NetworkPolicies (review 3/4, N2). Opt-in via networkPolicy.enabled
# because they only do anything on a policy-enforcing CNI (Calico/Cilium/…) and a mismatched CNI
# should not surprise an operator. Primary goal: EGRESS control — api/worker are the only pods
# allowed out to GitHub on :443; the ingestor (HMAC-verify + enqueue only) never reaches GitHub.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "actionsplane.fullname" . }}-default-deny
  labels: {{- $labels | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "actionsplane.fullname" . }}-allow-dns
  labels: {{- $labels | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
{{- if .Values.postgres.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "actionsplane.fullname" . }}-postgres
  labels: {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/component: postgres, app.kubernetes.io/instance: {{ $inst }} }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app.kubernetes.io/component: api, app.kubernetes.io/instance: {{ $inst }} } }
        - podSelector: { matchLabels: { app.kubernetes.io/component: ingestor, app.kubernetes.io/instance: {{ $inst }} } }
        - podSelector: { matchLabels: { app.kubernetes.io/component: worker, app.kubernetes.io/instance: {{ $inst }} } }
        - podSelector: { matchLabels: { app.kubernetes.io/component: migrate, app.kubernetes.io/instance: {{ $inst }} } }
      ports:
        - { protocol: TCP, port: 5432 }
{{- end }}
{{- if .Values.redis.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "actionsplane.fullname" . }}-redis
  labels: {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/component: redis, app.kubernetes.io/instance: {{ $inst }} }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app.kubernetes.io/component: api, app.kubernetes.io/instance: {{ $inst }} } }
        - podSelector: { matchLabels: { app.kubernetes.io/component: ingestor, app.kubernetes.io/instance: {{ $inst }} } }
        - podSelector: { matchLabels: { app.kubernetes.io/component: worker, app.kubernetes.io/instance: {{ $inst }} } }
      ports:
        - { protocol: TCP, port: 6379 }
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "actionsplane.fullname" . }}-api
  labels: {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/component: api, app.kubernetes.io/instance: {{ $inst }} }
  policyTypes: [Ingress, Egress]
  ingress:
    {{- if $ingressNs }}
    # Scoped: only the ingress controller's namespace plus the in-release frontend (its nginx
    # proxies /api + SSE to us) may reach :8000.
    - from:
        - namespaceSelector:
            matchLabels: {{- toYaml $ingressNs | nindent 14 }}
        - podSelector: { matchLabels: { app.kubernetes.io/component: frontend, app.kubernetes.io/instance: {{ $inst }} } }
      ports:
        - { protocol: TCP, port: 8000 }
    {{- else }}
    # Permissive default (port-scoped, any peer): the chart can't guess where your ingress
    # controller runs, and a wrong guess would silently drop traffic. Set
    # networkPolicy.ingressControllerNamespaceSelector to tighten this to the controller namespace.
    - ports:
        - { protocol: TCP, port: 8000 }
    {{- end }}
  egress:
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/component: postgres, app.kubernetes.io/instance: {{ $inst }} } }
      ports:
        - { protocol: TCP, port: 5432 }
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/component: redis, app.kubernetes.io/instance: {{ $inst }} } }
      ports:
        - { protocol: TCP, port: 6379 }
    # GitHub REST/SARIF/PRs over HTTPS to any host (NetworkPolicy can't match DNS names).
    - ports:
        - { protocol: TCP, port: 443 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "actionsplane.fullname" . }}-ingestor
  labels: {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/component: ingestor, app.kubernetes.io/instance: {{ $inst }} }
  policyTypes: [Ingress, Egress]
  ingress:
    {{- if $ingressNs }}
    # Scoped: webhooks arrive only via the ingress controller.
    - from:
        - namespaceSelector:
            matchLabels: {{- toYaml $ingressNs | nindent 14 }}
      ports:
        - { protocol: TCP, port: 8001 }
    {{- else }}
    # Permissive default (port-scoped, any peer) — see the api policy comment.
    - ports:
        - { protocol: TCP, port: 8001 }
    {{- end }}
  egress:
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/component: postgres, app.kubernetes.io/instance: {{ $inst }} } }
      ports:
        - { protocol: TCP, port: 5432 }
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/component: redis, app.kubernetes.io/instance: {{ $inst }} } }
      ports:
        - { protocol: TCP, port: 6379 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "actionsplane.fullname" . }}-worker
  labels: {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/component: worker, app.kubernetes.io/instance: {{ $inst }} }
  policyTypes: [Ingress, Egress]
  egress:
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/component: postgres, app.kubernetes.io/instance: {{ $inst }} } }
      ports:
        - { protocol: TCP, port: 5432 }
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/component: redis, app.kubernetes.io/instance: {{ $inst }} } }
      ports:
        - { protocol: TCP, port: 6379 }
    - ports:
        - { protocol: TCP, port: 443 }
{{- if .Values.migrate.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "actionsplane.fullname" . }}-migrate
  labels: {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/component: migrate, app.kubernetes.io/instance: {{ $inst }} }
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/component: postgres, app.kubernetes.io/instance: {{ $inst }} } }
      ports:
        - { protocol: TCP, port: 5432 }
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "actionsplane.fullname" . }}-frontend
  labels: {{- $labels | nindent 4 }}
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/component: frontend, app.kubernetes.io/instance: {{ $inst }} }
  policyTypes: [Ingress, Egress]
  ingress:
    {{- if $ingressNs }}
    # Scoped: the SPA is served only via the ingress controller.
    - from:
        - namespaceSelector:
            matchLabels: {{- toYaml $ingressNs | nindent 14 }}
      ports:
        - { protocol: TCP, port: 80 }
    {{- else }}
    # Permissive default (port-scoped, any peer) — see the api policy comment.
    - ports:
        - { protocol: TCP, port: 80 }
    {{- end }}
  egress:
    - to:
        - podSelector: { matchLabels: { app.kubernetes.io/component: api, app.kubernetes.io/instance: {{ $inst }} } }
      ports:
        - { protocol: TCP, port: 8000 }
{{- end }}
