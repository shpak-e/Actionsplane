# -- Container image registry + tag shared by the four app images.
image:
  registry: ghcr.io/itamar
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# Per-component image *name* (under image.registry), replica count, and resources.
api:
  imageName: actionsplane-api
  replicas: 2
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "1", memory: "512Mi" }
ingestor:
  imageName: actionsplane-ingestor
  replicas: 2
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "1", memory: "512Mi" }
worker:
  # single replica on purpose: arq cron sweeps must not be double-scheduled
  imageName: actionsplane-worker
  replicas: 1
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "1", memory: "512Mi" }
frontend:
  imageName: actionsplane-frontend
  replicas: 2
  resources:
    requests: { cpu: "20m", memory: "32Mi" }
    limits: { cpu: "200m", memory: "128Mi" }

# Non-secret runtime config (rendered into a ConfigMap). REDIS_URL/DB host are derived from
# the release name in the templates.
config:
  githubApiUrl: "https://api.github.com"
  githubAppPrivateKeyPath: "/secrets/github-app.pem"
  fetchConcurrency: 8
  pollIntervalSeconds: 300
  bulkEditsEnabled: false

# Secrets are referenced by name (created out-of-band: Sealed Secrets / ESO / cloud manager).
# Keys expected in `existingSecret`: ACTIONSPLANE_DATABASE_URL, POSTGRES_PASSWORD,
# ACTIONSPLANE_GITHUB_WEBHOOK_SECRET, ACTIONSPLANE_GITHUB_APP_ID, ACTIONSPLANE_API_TOKEN.
# `existingGithubKeySecret` must contain key `github-app.pem`.
secrets:
  existingSecret: actionsplane-secrets
  existingGithubKeySecret: actionsplane-github-key

# Bundled datastores for evaluation. Disable and use managed services in production.
postgres:
  enabled: true
  image: postgres:16-alpine
  storage: 10Gi
redis:
  enabled: true
  image: redis:7-alpine
  # Require a password (review §4 H-1). The bundled Redis runs with --requirepass and the app
  # injects the same secret into its Redis URL. Keep true unless you front Redis with your own
  # authenticated/managed instance. The password lives in `secrets.existingSecret` under key
  # ACTIONSPLANE_REDIS_PASSWORD.
  auth: true

# Run the Alembic migration as a pre-install/pre-upgrade hook.
migrate:
  enabled: true

ingress:
  enabled: true
  className: nginx
  host: actionsplane.example.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Assumes a cert-manager ClusterIssuer; change to match your setup (or disable tls below and
    # point secretName at a pre-provisioned cert).
    cert-manager.io/cluster-issuer: letsencrypt-prod
  # TLS on by default (review §4 M-2): the webhook secret + operate bearer token must not traverse
  # plaintext. secretName is where the cert lives (cert-manager fills it, or provide it yourself).
  tls:
    enabled: true
    secretName: actionsplane-tls

# Default-deny + least-privilege NetworkPolicies (review §4 H-1 / N2). ON by default: this service
# holds a GitHub App key and its HMAC boundary depends on network isolation, so the secure posture
# ships as the default. On a CNI that doesn't enforce NetworkPolicy these are silent no-ops (still
# safe); set false only if your platform manages egress/isolation another way. See
# templates/networkpolicy.yaml.
networkPolicy:
  enabled: true
  # Restrict the ingress-facing pods (api :8000, ingestor :8001, frontend :80) to traffic from
  # your ingress controller's namespace. Set to that namespace's labels, e.g. for ingress-nginx:
  #   ingressControllerNamespaceSelector:
  #     kubernetes.io/metadata.name: ingress-nginx
  # Default {} keeps those ingress rules port-scoped but peer-permissive: the chart can't guess
  # where the controller runs, and a wrong guess would silently drop webhooks/UI traffic.
  ingressControllerNamespaceSelector: {}
