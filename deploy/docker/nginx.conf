server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # SPA: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + SSE to the api service (k8s service name : port).
    location /api/ {
        proxy_pass http://actionsplane-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Server-Sent Events need buffering off and a long read timeout.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
