server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Compress text responses (JSON API, JS/CSS bundles). gzip on the proxied API too.
    gzip on;
    gzip_proxied any;
    gzip_types application/json application/javascript text/css text/plain image/svg+xml;
    gzip_min_length 1024;

    # SPA: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The SSE stream alone needs buffering off + a long read timeout; scoping it here (not to all
    # of /api/) lets the rest of the API keep nginx's response buffering, which pairs with the
    # backend's gzip and avoids slow-client head-of-line stalls on normal JSON responses.
    location /api/v1/events/ {
        proxy_pass http://actionsplane-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Everything else on the API: buffered proxy (default), normal timeouts.
    location /api/ {
        proxy_pass http://actionsplane-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
    }
}
