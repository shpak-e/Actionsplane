apiVersion: v1
kind: Service
metadata:
  name: actionsplane-redis
  namespace: actionsplane
spec:
  selector:
    app: actionsplane-redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: actionsplane-redis
  namespace: actionsplane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actionsplane-redis
  template:
    metadata:
      labels:
        app: actionsplane-redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      containers:
        - name: redis
          image: redis:7-alpine
          # Require auth (review §4 H-1): unauthenticated Redis lets anyone on the port enqueue arq
          # jobs (bypassing the webhook HMAC boundary) and forge SSE envelopes. Password from the
          # app secret; REDISCLI_AUTH lets the probe authenticate without putting it on the cmdline.
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef: { name: actionsplane-secrets, key: ACTIONSPLANE_REDIS_PASSWORD }
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef: { name: actionsplane-secrets, key: ACTIONSPLANE_REDIS_PASSWORD }
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
