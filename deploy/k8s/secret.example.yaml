# EXAMPLE ONLY — do not commit real secrets. Two secrets:
#   actionsplane-secrets     : env-injectable string values (valid env-var names)
#   actionsplane-github-key  : the GitHub App private key, mounted as a file
#
# Create them out-of-band, e.g.:
#   kubectl -n actionsplane create secret generic actionsplane-secrets \
#     --from-literal=ACTIONSPLANE_DATABASE_URL='postgresql+asyncpg://actionsplane:PW@actionsplane-postgres:5432/actionsplane' \
#     --from-literal=POSTGRES_PASSWORD='PW' \
#     --from-literal=ACTIONSPLANE_GITHUB_WEBHOOK_SECRET='CHANGE_ME' \
#     --from-literal=ACTIONSPLANE_GITHUB_APP_ID='123456' \
#     --from-literal=ACTIONSPLANE_API_TOKEN='CHANGE_ME' \
#     --from-literal=ACTIONSPLANE_REDIS_PASSWORD='CHANGE_ME'
#   kubectl -n actionsplane create secret generic actionsplane-github-key \
#     --from-file=github-app.pem=./actionsplane.private-key.pem
# In real clusters prefer Sealed Secrets / External Secrets Operator / a cloud secret manager.
apiVersion: v1
kind: Secret
metadata:
  name: actionsplane-secrets
  namespace: actionsplane
type: Opaque
stringData:
  ACTIONSPLANE_DATABASE_URL: "postgresql+asyncpg://actionsplane:CHANGE_ME@actionsplane-postgres:5432/actionsplane"
  POSTGRES_PASSWORD: "CHANGE_ME"
  ACTIONSPLANE_GITHUB_WEBHOOK_SECRET: "CHANGE_ME"
  ACTIONSPLANE_GITHUB_APP_ID: "123456"
  ACTIONSPLANE_API_TOKEN: "CHANGE_ME"
  # Injected into the effective Redis URL by the app; also used by the redis container's
  # --requirepass and the readiness probe (review §4 H-1).
  ACTIONSPLANE_REDIS_PASSWORD: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: actionsplane-github-key
  namespace: actionsplane
type: Opaque
stringData:
  github-app.pem: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_WITH_YOUR_GITHUB_APP_PRIVATE_KEY
    -----END RSA PRIVATE KEY-----
