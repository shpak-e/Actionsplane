# Routes: GitHub webhooks -> ingestor; API + SSE -> api; everything else -> frontend SPA.
# Assumes an ingress controller (e.g. ingress-nginx). TLS is on by default (review §4 M-2): the
# webhook secret and the operate bearer token must not traverse plaintext. This assumes a
# cert-manager ClusterIssuer named "letsencrypt-prod" — change the annotation/secretName to match
# your setup, or point `tls` at a pre-provisioned certificate Secret.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: actionsplane
  namespace: actionsplane
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"   # SSE
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - actionsplane.example.com
      secretName: actionsplane-tls
  rules:
    - host: actionsplane.example.com
      http:
        paths:
          - path: /webhook
            pathType: Prefix
            backend:
              service:
                name: actionsplane-ingestor
                port:
                  number: 8001
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: actionsplane-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: actionsplane-frontend
                port:
                  number: 80
