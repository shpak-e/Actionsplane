apiVersion: v1
kind: Service
metadata:
  name: actionsplane-frontend
  namespace: actionsplane
spec:
  selector:
    app: actionsplane-frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: actionsplane-frontend
  namespace: actionsplane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: actionsplane-frontend
  template:
    metadata:
      labels:
        app: actionsplane-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/itamar/actionsplane-frontend:0.1.0
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "20m", memory: "32Mi" }
            limits: { cpu: "200m", memory: "128Mi" }
