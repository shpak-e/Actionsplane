apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: actionsplane
resources:
  - namespace.yaml
  - configmap.yaml
  # secret.example.yaml is a template — create the real Secrets out-of-band (see the file header),
  # or copy it to secret.yaml, fill in values, and uncomment the next line:
  # - secret.yaml
  - postgres.yaml
  - redis.yaml
  - migrate-job.yaml
  - api.yaml
  - ingestor.yaml
  - worker.yaml
  - frontend.yaml
  - ingress.yaml

# Pin all five images to one tag in one place. Override the registry/tag per environment with
# `kustomize edit set image` or an overlay.
images:
  - name: ghcr.io/itamar/actionsplane-api
    newTag: "0.1.0"
  - name: ghcr.io/itamar/actionsplane-ingestor
    newTag: "0.1.0"
  - name: ghcr.io/itamar/actionsplane-worker
    newTag: "0.1.0"
  - name: ghcr.io/itamar/actionsplane-frontend
    newTag: "0.1.0"
